name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # @francav/components is consumed as a public git dependency (temporary, until a
      # registry is in place). npm records the ssh form in the lockfile's "resolved"
      # field; rewrite it to anonymous HTTPS so the public repo clones without an
      # SSH key. No token needed.
      - name: Use HTTPS for github.com git dependencies
        run: |
          git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm test
